<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>TurfJs Debug Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css' rel='stylesheet' />
  <link rel="stylesheet" href="/assets/style.css" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js'></script>
  <script type="importmap">
  {
    "imports": {
      "@turf/helpers": "https://cdn.jsdelivr.net/npm/@turf/helpers@7/+esm",
      "@turf/bbox": "https://cdn.jsdelivr.net/npm/@turf/bbox@7/+esm"
    }
  }
  </script>
</head>

<body>
  <div id="app">
    <header>
      <h1>TurfJS Debug Visualizer</h1>
      <div id="status">disconnected</div>
      <button id="theme-toggle">System</button>
    </header>

    <div id="main-container">
      <div id="content"></div>
      <div id="sidebar">
        <div id="sidebar-header">
          <label id="autofit-label">
            <input type="checkbox" id="autofit-checkbox" checked />
            Auto-fit
          </label>
          <button id="clear">clear all</button>
        </div>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/client.js"></script>
</body>

</html>
