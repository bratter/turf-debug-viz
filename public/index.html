<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>TurfJs Debug Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css' rel='stylesheet' />
  <link rel="stylesheet" href="/assets/style.css" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>
  <script src="assets/turf.min.js"></script>
</head>

<body>
  <div id="app">
    <header>
      <h1>TurfJS Debug Visualizer</h1>
      <div id="status">disconnected</div>
      <button id="theme-toggle">System</button>
      <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
    </header>

    <div id="main-container">
      <div id="content"></div>
      <div id="sidebar">
        <div id="sidebar-header">
          <label id="autofit-label">
            <input type="checkbox" id="autofit-checkbox" checked />
            Autofit
          </label>
          <button id="zoom-to-fit">zoom to fit</button>
          <label id="show-vertices-label">
            <input type="checkbox" id="show-vertices-checkbox" />
            Show vertices
          </label>
          <button id="clear">clear all</button>
        </div>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/client.js"></script>
</body>

</html>
