<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>TurfJs Debug Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>

<body>
  <header>
    <div id="status">disconnected</div>
    <div id="controls">
      <button id="clear">clear</button>
      <label>
        filter label:
        <input id="filter" placeholder="e.g. after-parse" />
      </label>
      <label>
        max rows:
        <select id="maxRows">
          <option>100</option>
          <option>300</option>
          <option selected>1000</option>
          <option>3000</option>
        </select>
      </label>
    </div>
  </header>

  <div id="log"></div>
  <script type="module" src="/assets/client.js"></script>
</body>

</html>
